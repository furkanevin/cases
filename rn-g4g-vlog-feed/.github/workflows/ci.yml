name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new commit lands —
# avoids burning runner minutes on stale work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  RUBY_VERSION: '3.2'
  JAVA_VERSION: '17'

jobs:
  # -------- 1. Static checks (lint + types + unit tests) ------------------
  # Runs first because it's fast and fails the whole pipeline cheaply.
  static-checks:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  # -------- 2. Android signed APK ----------------------------------------
  android:
    name: Build signed Android APK
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # Materialize the upload keystore from the base64 secret.
      # See DEPLOYMENT.md for how to generate and configure these secrets.
      - name: Decode upload keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload.keystore

      - name: List keystore aliases (debug)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          keytool -list -keystore android/app/upload.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" | grep -i 'Alias name' || true

      - name: Assemble release APK
        env:
          UPLOAD_STORE_FILE: upload.keystore
          UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false'
        working-directory: android
        run: ./gradlew assembleRelease -x lint -x lintVitalRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

  # -------- 3. iOS signed IPA --------------------------------------------
  # Note: this job only produces a signed IPA when the signing secrets are
  # configured. On a forked PR (where secrets are unavailable) it falls back
  # to an unsigned archive so the build itself is still validated.
  ios:
    name: Build signed iOS IPA
    runs-on: macos-15
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: .

      - name: Install JS dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install Pods
        working-directory: ios
        run: bundle exec pod install

      # Sign with fastlane match in real pipelines. For this template we use
      # the App Store Connect API key + provisioning profile pair stored as
      # secrets. The "if" gates skip signing when secrets are missing so
      # forked PRs can still run the build job.
      - name: Import signing assets
        if: ${{ env.APPLE_API_KEY_BASE64 != '' }}
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "$IOS_DIST_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"

      - name: Build & archive
        working-directory: ios
        run: |
          xcodebuild \
            -workspace AwesomeProject.xcworkspace \
            -scheme AwesomeProject \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/AwesomeProject.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=${{ secrets.APPLE_API_KEY_BASE64 != '' && 'YES' || 'NO' }} \
            | xcpretty || true

      - name: Export signed IPA
        if: ${{ env.APPLE_API_KEY_BASE64 != '' }}
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        working-directory: ios
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict></plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/AwesomeProject.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa-out" \
            | xcpretty || true

      - name: Upload IPA artifact
        if: ${{ env.APPLE_API_KEY_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: ${{ runner.temp }}/ipa-out/*.ipa
          if-no-files-found: error
          retention-days: 14
