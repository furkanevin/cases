version: "3.8"

services:
  home:
    build:
      context: ./home
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./shared:/app/shared:ro
    networks:
      - microfrontend-network

  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    volumes:
      - ./shared:/app/shared:ro
    networks:
      - microfrontend-network
    depends_on:
      - home

networks:
  microfrontend-network:
    driver: bridge

