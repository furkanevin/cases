services:
  postgres:
    image: postgres:16-alpine
    container_name: aerocity-pg
    environment:
      POSTGRES_USER: aerocity
      POSTGRES_PASSWORD: aerocity
      POSTGRES_DB: aerocity_dev
    ports:
      - '55432:5432'
    volumes:
      - aerocity-pgdata:/var/lib/postgresql/data
volumes:
  aerocity-pgdata:
